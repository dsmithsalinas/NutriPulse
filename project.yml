name: NutriPulse

# XcodeGen generates NutriPulse.xcodeproj from this file.
# Edit project.yml and run `xcodegen generate` — never hand-edit the .xcodeproj.

options:
  bundleIdPrefix: com.dustin.nutripulse
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  generateEmptyDirectories: true
  createIntermediateGroups: true

# Build settings injected via xcconfig (see Configurations/).
# SUPABASE_URL and SUPABASE_ANON_KEY flow in from Secrets.xcconfig.
configFiles:
  Debug: Configurations/Debug.xcconfig
  Release: Configurations/Release.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  TelemetryDeck:
    url: https://github.com/TelemetryDeck/SwiftSDK
    from: "2.0.0"

targets:
  NutriPulse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutriPulse
      - path: Shared
    info:
      path: NutriPulse/Info.plist
      properties:
        CFBundleDisplayName: NutriPulse
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSHealthShareUsageDescription: "NutriPulse reads weight, body fat, BMI, lean body mass, water, active energy, HRV, resting HR, and sleep from Apple Health."
        NSHealthUpdateUsageDescription: "NutriPulse writes weight, body fat, BMI, lean body mass, and water logs to Apple Health."
        NSCameraUsageDescription: "NutriPulse uses the camera to scan food barcodes."
        NSMicrophoneUsageDescription: "NutriPulse uses the microphone so you can speak your food log instead of typing it."
        NSSpeechRecognitionUsageDescription: "NutriPulse transcribes your spoken food log into text so Pulse can parse it."
        # These land in Info.plist so Config.swift can read them at runtime.
        # Values are set in Configurations/Secrets.xcconfig (gitignored).
        SUPABASE_URL: "$(SUPABASE_URL)"
        SUPABASE_ANON_KEY: "$(SUPABASE_ANON_KEY)"
        TELEMETRYDECK_APP_ID: "$(TELEMETRYDECK_APP_ID)"
    entitlements:
      path: NutriPulse/NutriPulse.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.dustin.nutripulse
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.dustin.nutripulse.app
        DEVELOPMENT_TEAM: "G574NUGMU2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
        # iPhone only. XcodeGen's default (1,2) claimed iPad support, which trips the store
        # validator — "All interface orientations must be supported unless the app requires
        # full screen" — because this app is portrait-only. It has no iPad layout either, so
        # iPad reviewers and TestFlight testers would get a stretched phone UI, and the App
        # Store listing would demand iPad screenshots.
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: TelemetryDeck
        product: TelemetryDeck
      - target: NutriPulseWidgets

  # Home Screen + Lock Screen widgets for the protein floor. Shares data with the app through
  # the App Group container (see Shared/ProteinFloorShared.swift).
  NutriPulseWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutriPulseWidgets
      - path: Shared
    info:
      path: NutriPulseWidgets/Info.plist
      properties:
        CFBundleDisplayName: NutriPulse
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: NutriPulseWidgets/NutriPulseWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dustin.nutripulse
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: com.dustin.nutripulse.app.widgets
        DEVELOPMENT_TEAM: "G574NUGMU2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"

  NutriPulseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NutriPulseTests
    dependencies:
      - target: NutriPulse
    settings:
      base:
        SWIFT_VERSION: "5.9"
        # Without this the test bundle can't code sign ("target does not have an
        # Info.plist file"), so `xcodebuild test` could never run at all.
        GENERATE_INFOPLIST_FILE: YES
